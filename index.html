<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ИТ . CRM - ТОП 50 ШКОЛ</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            blue: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' },
            slate: { 50: '#f8fafc', 800: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f8fafc;
      --accent: #3b82f6;
    }
    
    * {
      box-sizing: border-box;
      font-family: 'Roboto Condensed', sans-serif !important;
      font-style: italic !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      -webkit-tap-highlight-color: transparent;
    }

    body, html {
      margin: 0; padding: 0;
      background-color: var(--bg);
      color: var(--text);
    }
    
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .glass-card {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    
    const createLucideIcon = (iconName) => {
      return ({ className }) => {
        const ref = useRef(null);
        useEffect(() => {
          if (ref.current) {
            ref.current.innerHTML = '';
            const iconSvg = lucide.icons[iconName];
            if (iconSvg) {
              const parser = new DOMParser();
              const svgDoc = parser.parseFromString(iconSvg.toSvg({ class: className, width: 24, height: 24 }), 'image/svg+xml');
              ref.current.appendChild(svgDoc.documentElement);
            }
          }
        }, [className]);
        return <span ref={ref} className="inline-flex items-center justify-center"></span>;
      };
    };

    const Settings = createLucideIcon('Settings');
    const Navigation = createLucideIcon('Navigation');
    const Trophy = createLucideIcon('Trophy');
    const Star = createLucideIcon('Star');
    const CreditCard = createLucideIcon('CreditCard');
    const GraduationCap = createLucideIcon('GraduationCap');
    const Info = createLucideIcon('Info');
    const Filter = createLucideIcon('Filter');
    const ChevronUp = createLucideIcon('ChevronUp');
    const ChevronDown = createLucideIcon('ChevronDown');
    const Globe = createLucideIcon('Globe');
    const Clock = createLucideIcon('Clock');
    const XCircle = createLucideIcon('XCircle');
    const Calendar = createLucideIcon('Calendar');
    const MessageSquare = createLucideIcon('MessageSquare');
    const CheckCircle = createLucideIcon('CheckCircle');

    // Предзаполненная база из 50 ИТ школ Москвы (для демо сгенерированы лучшие + вымышленные варианты)
    const initialSchoolsData = Array.from({ length: 50 }).map((_, i) => {
      const realNames = [
        'Школа 548 ЗИЛАРТ', 'Школа 548 Совхоз Ленина', 'Лицей 1533 ЛИТ', 'Бауманская школа 1580', 'Школа 1580 Символ',
        'Школа Летово', 'СУНЦ МГУ', 'Школа Интеллектуал', 'Школа 1329', 'Вторая школа',
        'Хорошкола', 'Новая школа', 'НИЯУ МИФИ', 'Школа 444', 'Школа 1514',
        'Лицей ВШЭ', 'Школа 57', 'Класс-центр', 'Школа 2007 ФМШ', 'Школа 1568',
        'Курчатовская школа', 'Школа 1543', 'Школа 179', 'Гимназия 1543', 'Школа 1502 МЭИ',
        'Школа ЦПМ', 'Школа 1535', 'Гимназия 1514', 'Академическая гимназия 56', 'Президентский ФМЛ 239',
        'Школа 2086', 'Лицей 1502 при МЭИ', 'Школа 1581', 'Школа 67', 'Школа 1253',
        'Гимназия 1567', 'Школа 1520', 'Лицей 1547', 'Школа 109', 'Лицей 1525',
        'Школа 1524', 'Школа 1534', 'Школа 1561', 'Школа 1583', 'Школа 1547',
        'Гимназия 1529', 'Школа 1409', 'Летово Junior', 'Физтех-лицей им. Капицы', 'Школа Сириус'
      ];
      
      const isPaid = !!(i === 5 || i === 10 || i === 11 || i === 25 || i === 47); // Некоторые школы платные

      return {
        id: `s${i+1}`,
        name: realNames[i],
        rating: Math.floor(Math.random() * 50) + 1,
        distance: parseFloat((Math.random() * 30 + 1).toFixed(1)),
        site: 'https://mskobr.ru',
        phone: '+7495' + Math.floor(1000000 + Math.random() * 9000000),
        profile: ['Кванториум', 'Олимпиады', 'Инженерия', 'Алгоритмы', 'ИИ', 'ИТ классы'][i % 6],
        olympiadScore: Math.floor(Math.random() * 400) + 50,
        isPaid: isPaid,
        status: 'plan', // план, встреча, цель, архив
        order: i,
        // Новые CRM ERP поля:
        mathScore: null,
        infoScore: null,
        rusScore: null,
        appointmentDate: '',
        appointmentTime: '',
        agreements: '',
        timeline: [] // { date: '2026-03-12', text: 'Звонок состоялся', type: 'call' }
      };
    });

    const STATUSES = [
      { id: 'plan', label: 'План', color: 'bg-slate-800' },
      { id: 'agreed', label: 'Встреча', color: 'bg-blue-900' },
      { id: 'visited', label: 'Визит', color: 'bg-purple-900' },
      { id: 'selected', label: 'Цель', color: 'bg-emerald-900' },
      { id: 'rejected', label: 'Архив', color: 'bg-rose-900' },
      { id: 'timeline', label: 'Расписание', color: 'bg-amber-900' }, // Новый системный статус
    ];

    const SORT_OPTIONS = [
      { id: 'distance', icon: Navigation, label: 'КМ' },
      { id: 'olympiadScore', icon: Trophy, label: 'ИТ' },
      { id: 'rating', icon: Star, label: 'ТОП' },
      { id: 'isPaid', icon: CreditCard, label: 'РУБ' },
    ];

    const MODAL_TABS = [
      { id: 'scores', label: 'Оценки' },
      { id: 'interview', label: 'Собеседование' },
      { id: 'agreements', label: 'Итоги' }
    ];

    function App() {
      // Подключение LocalStorage
      const [schools, setSchools] = useState(() => {
        const saved = localStorage.getItem('schoolCrmData');
        if (saved) return JSON.parse(saved);
        return initialSchoolsData;
      });

      useEffect(() => {
        localStorage.setItem('schoolCrmData', JSON.stringify(schools));
      }, [schools]);

      const [activeTab, setActiveTab] = useState('timeline');
      const [sortStack, setSortStack] = useState(['distance', 'olympiadScore', 'rating', 'isPaid']);
      const [editingSchool, setEditingSchool] = useState(null);
      const [modalTab, setModalTab] = useState('scores');

      const list = useMemo(() => {
        if (activeTab === 'timeline') {
          // Специальный вид: только школы с назначенной датой
          return schools
            .filter(s => s.appointmentDate)
            .sort((a, b) => {
              const dateA = new Date(`${a.appointmentDate}T${a.appointmentTime || '00:00'}`);
              const dateB = new Date(`${b.appointmentDate}T${b.appointmentTime || '00:00'}`);
              return dateA - dateB;
            });
        }

        return schools
          .filter(s => s.status === activeTab)
          .sort((a, b) => {
            for (const key of sortStack) {
              let diff = 0;
              if (key === 'distance') diff = a.distance - b.distance;
              else if (key === 'olympiadScore') diff = b.olympiadScore - a.olympiadScore;
              else if (key === 'rating') diff = a.rating - b.rating;
              else if (key === 'isPaid') diff = (a.isPaid === b.isPaid) ? 0 : (a.isPaid ? 1 : -1);

              if (diff !== 0) return diff;
            }
            return (a.order || 0) - (b.order || 0);
          });
      }, [schools, activeTab, sortStack]);

      const toggleSort = (id) => {
        setSortStack(prev => {
          const remaining = prev.filter(x => x !== id);
          return [id, ...remaining];
        });
        if (activeTab === 'timeline') setActiveTab('plan'); // Переключаем на план при сортировке
      };

      const save = (e) => {
        e.preventDefault();
        
        // Добавление в таймлайн если изменилась дата или итоги
        const oldSchool = schools.find(s => s.id === editingSchool.id);
        const newTimeline = [...(editingSchool.timeline || [])];
        
        if (oldSchool.agreements !== editingSchool.agreements && editingSchool.agreements) {
          newTimeline.unshift({ date: new Date().toISOString(), text: 'Обновлены итоги разговора', type: 'note' });
        }
        if (oldSchool.appointmentDate !== editingSchool.appointmentDate) {
          newTimeline.unshift({ date: new Date().toISOString(), text: `Назначена встреча: ${editingSchool.appointmentDate} ${editingSchool.appointmentTime}`, type: 'meeting' });
        }
        
        const finalSchool = { ...editingSchool, timeline: newTimeline };
        
        setSchools(prev => prev.map(s => s.id === finalSchool.id ? finalSchool : s));
        setEditingSchool(null);
      };

      const moveManual = (s, dir) => {
        const idx = list.findIndex(x => x.id === s.id);
        if (dir === 'up' && idx === 0) return;
        if (dir === 'down' && idx === list.length - 1) return;
        const neighbor = list[dir === 'up' ? idx - 1 : idx + 1];
        
        setSchools(prev => prev.map(item => {
          if (item.id === s.id) return { ...item, order: neighbor.order };
          if (item.id === neighbor.id) return { ...item, order: s.order };
          return item;
        }));
      };

      // Подсчет общего балла
      const getTotalScore = (s) => (Number(s.mathScore) || 0) + (Number(s.infoScore) || 0) + (Number(s.rusScore) || 0);

      return (
        <div className="min-h-screen bg-slate-900 text-slate-50 pb-20 select-none">
          {/* Шапка (Glassmorphism) */}
          <header className="glass sticky top-0 z-40 px-4 py-5 shadow-[0_10px_30px_rgba(0,0,0,0.5)] border-b border-white/5">
            <div className="max-w-2xl mx-auto flex flex-col gap-5">
              <div className="flex items-center justify-between">
                <div>
                  <h1 className="text-2xl font-black flex items-center gap-3 tracking-widest text-shadow">
                    <GraduationCap className="text-blue-500 w-8 h-8 drop-shadow-[0_0_8px_rgba(59,130,246,0.8)]" />
                    ИТ . CRM . ERP
                  </h1>
                  <div className="flex items-center gap-1 mt-1 opacity-60">
                    <Info className="w-3 h-3 text-slate-400" />
                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{schools.length} Школ в базе</p>
                  </div>
                </div>
                
                <div className="flex gap-2">
                  {SORT_OPTIONS.map(o => {
                    const priority = sortStack.indexOf(o.id) + 1;
                    const isLeader = priority === 1;
                    return (
                      <button 
                        key={o.id}
                        onClick={() => toggleSort(o.id)}
                        className={`relative w-12 h-12 rounded-xl transition-all flex items-center justify-center border border-white/10 ${
                          isLeader && activeTab !== 'timeline'
                            ? 'bg-blue-600/20 shadow-[0_0_15px_rgba(37,99,235,0.5)] scale-110 z-10 text-blue-400 border-blue-500/50' 
                            : 'bg-slate-800 text-slate-500 hover:text-slate-300'
                        }`}
                      >
                        <o.icon className="w-6 h-6" />
                        {(isLeader && activeTab !== 'timeline') && (
                          <div className={`absolute -top-2 -right-2 w-5 h-5 rounded-md text-[10px] font-black flex items-center justify-center border border-slate-900 shadow-xl bg-rose-500 text-white shadow-[0_0_10px_rgba(244,63,94,0.6)]`}>
                            {priority}
                          </div>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>
              
              <div className="flex gap-2 overflow-x-auto no-scrollbar py-2">
                {STATUSES.map(s => {
                  const count = s.id === 'timeline' 
                    ? schools.filter(x => x.appointmentDate).length 
                    : schools.filter(x => x.status === s.id).length;
                  return (
                    <button
                      key={s.id}
                      onClick={() => setActiveTab(s.id)}
                      className={`flex-1 whitespace-nowrap px-4 py-3 rounded-xl text-[11px] font-black transition-all border border-white/5 ${
                        activeTab === s.id 
                          ? (s.id === 'timeline' ? 'bg-amber-600 border-amber-500 text-white shadow-[0_0_15px_rgba(217,119,6,0.4)]' : 'bg-blue-600 text-white shadow-[0_0_15px_rgba(59,130,246,0.4)] border-blue-500')
                          : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                      }`}
                    >
                      {s.label.toUpperCase()} . {count}
                    </button>
                  );
                })}
              </div>
            </div>
          </header>

          <main className="max-w-2xl mx-auto p-4 space-y-5 mt-4">
            {activeTab === 'timeline' && (
              <div className="flex items-center justify-center mb-6">
                <div className="bg-amber-500/10 border border-amber-500/30 text-amber-400 px-6 py-3 rounded-2xl flex items-center gap-3">
                  <Calendar className="w-5 h-5" />
                  <span className="text-[12px] font-black tracking-widest uppercase">Будущие собеседования</span>
                </div>
              </div>
            )}

            {list.map(s => (
              <div key={s.id} className="glass-card rounded-[24px] overflow-hidden flex flex-col hover:shadow-[0_10px_40px_rgba(0,0,0,0.8)] transition-all fade-in relative">
                
                {/* Индикатор статуса */}
                <div className={`absolute left-0 top-0 bottom-0 w-1 ${STATUSES.find(st => st.id === s.status)?.color?.replace('bg-', 'bg-') || 'bg-slate-700'}`}></div>

                <div className="p-5 pl-7 flex items-start gap-4">
                  {activeTab !== 'timeline' && (
                    <div className="flex flex-col gap-1 items-center bg-slate-900/80 p-2 rounded-xl border border-white/5 shrink-0 shadow-inner">
                      <button onClick={() => moveManual(s, 'up')} className="p-1.5 text-slate-500 hover:text-blue-400 active:scale-125 transition-transform"><ChevronUp className="w-6 h-6" /></button>
                      <button onClick={() => moveManual(s, 'down')} className="p-1.5 text-slate-500 hover:text-blue-400 active:scale-125 transition-transform"><ChevronDown className="w-6 h-6" /></button>
                    </div>
                  )}

                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between mb-3">
                      <div className="flex gap-2">
                        <div className={`px-3 py-1 rounded-sm text-[9px] font-black uppercase tracking-widest shadow-lg ${
                          s.isPaid ? 'bg-rose-500/10 text-rose-400 border border-rose-500/20' : 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20'
                        }`}>
                          {s.isPaid ? 'Платная' : 'Бесплатная'}
                        </div>
                        <div className="px-3 py-1 rounded-sm text-[9px] font-black uppercase tracking-widest shadow-lg bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">
                          {s.profile}
                        </div>
                      </div>
                      
                      {getTotalScore(s) > 0 && (
                        <div className="flex items-center gap-1.5 text-[11px] font-black text-amber-400 bg-amber-900/20 px-3 py-1 rounded-md border border-amber-500/20 shadow-inner">
                          Рез: {getTotalScore(s)} / 300
                        </div>
                      )}
                    </div>
                    
                    <h2 className="text-xl font-black text-slate-50 truncate mb-1 leading-tight drop-shadow-md">
                      {s.name}
                    </h2>
                    
                    {activeTab === 'timeline' ? (
                      <div className="mt-3 flex items-center gap-2 text-rose-400 bg-rose-900/20 p-3 rounded-xl border border-rose-500/20 mb-2">
                        <Clock className="w-5 h-5 flex-shrink-0 animate-pulse" />
                        <div>
                          <p className="text-[10px] font-bold uppercase opacity-80">Назначено:</p>
                          <p className="text-[14px] font-black">{s.appointmentDate} в {s.appointmentTime || '--:--'}</p>
                        </div>
                      </div>
                    ) : (
                      <div className="flex flex-wrap gap-2 mt-4">
                        <div className={`flex items-center gap-2 px-3 py-2 rounded-lg text-[10px] tracking-wide font-black border transition-colors shadow-lg ${sortStack[0] === 'distance' ? 'bg-blue-600/20 border-blue-500/50 text-blue-300' : 'bg-slate-800/50 border-white/5 text-slate-400'}`}>
                          <Navigation className="w-4 h-4" /> {s.distance} км
                        </div>
                        <div className={`flex items-center gap-2 px-3 py-2 rounded-lg text-[10px] tracking-wide font-black border transition-colors shadow-lg ${sortStack[0] === 'olympiadScore' ? 'bg-blue-600/20 border-blue-500/50 text-blue-300' : 'bg-slate-800/50 border-white/5 text-slate-400'}`}>
                          <Trophy className="w-4 h-4" /> ИТ {s.olympiadScore}
                        </div>
                        <div className={`flex items-center gap-2 px-3 py-2 rounded-lg text-[10px] tracking-wide font-black border transition-colors shadow-lg ${sortStack[0] === 'rating' ? 'bg-blue-600/20 border-blue-500/50 text-blue-300' : 'bg-slate-800/50 border-white/5 text-slate-400'}`}>
                          <Star className="w-4 h-4" /> ТОП {s.rating}
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                {s.agreements && activeTab !== 'timeline' && (
                  <div className="mx-5 mb-5 p-4 bg-slate-900/60 rounded-xl border-l-4 border-blue-500 text-[12px] text-slate-300 font-bold italic leading-relaxed shadow-inner line-clamp-2">
                    {s.agreements}
                  </div>
                )}

                <div className="px-5 pb-5 pl-7 flex gap-3">
                  <a href={s.site} target="_blank" className="flex-1 flex items-center justify-center gap-2 bg-slate-800/80 hover:bg-slate-700 text-slate-200 py-4 rounded-xl text-[13px] font-black shadow-lg active:scale-95 transition-all border border-white/5">
                    <Globe className="w-4 h-4 text-blue-400" /> САЙТ
                  </a>
                  <button onClick={() => { setEditingSchool({ ...s }); setModalTab('scores'); }} className="flex-1 flex items-center justify-center gap-2 bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 py-4 rounded-xl text-[13px] font-black border border-blue-500/30 active:scale-95 transition-all shadow-[0_0_15px_rgba(59,130,246,0.15)]">
                    <Settings className="w-4 h-4" /> CRM / ERP
                  </button>
                </div>
              </div>
            ))}

            {list.length === 0 && (
              <div className="text-center py-24 bg-slate-800/30 rounded-[32px] border-2 border-dashed border-slate-700 glass">
                <CheckCircle className="w-16 h-16 text-slate-600 mx-auto mb-4 drop-shadow-md" />
                <p className="text-[12px] font-black text-slate-500 uppercase tracking-widest drop-shadow">Пусто</p>
              </div>
            )}
          </main>

          {editingSchool && (
            <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-slate-900/80 backdrop-blur-xl fade-in overflow-y-auto">
              <div className="bg-slate-800 border border-white/10 w-full max-w-2xl rounded-t-[40px] sm:rounded-[32px] shadow-[0_20px_60px_rgba(0,0,0,0.8)] overflow-hidden my-auto">
                <div className="p-6 sm:p-8 pb-12">
                  <div className="flex justify-between items-start mb-6">
                    <div className="flex flex-col gap-1 pr-4">
                      <h3 className="text-2xl font-black text-white leading-tight drop-shadow-md">{editingSchool.name}</h3>
                      <p className="text-[11px] font-black text-blue-400/80 uppercase tracking-widest italic drop-shadow">Система управления</p>
                    </div>
                    <button onClick={() => setEditingSchool(null)} className="p-3 bg-slate-900/50 rounded-[12px] text-slate-400 hover:text-rose-400 active:scale-90 transition-all border border-white/5 shrink-0">
                      <XCircle className="w-7 h-7" />
                    </button>
                  </div>

                  {/* Статусы */}
                  <div className="flex gap-2 overflow-x-auto no-scrollbar pb-6 mb-2 border-b border-white/5">
                    {STATUSES.filter(s => s.id !== 'timeline').map(st => (
                      <button
                        key={st.id}
                        type="button"
                        onClick={() => setEditingSchool({ ...editingSchool, status: st.id })}
                        className={`px-5 py-2.5 rounded-xl text-[10px] sm:text-[11px] font-black transition-all whitespace-nowrap shadow-lg border ${
                          editingSchool.status === st.id 
                            ? 'bg-blue-600 text-white shadow-[0_0_20px_rgba(59,130,246,0.6)] border-blue-400' 
                            : 'bg-slate-900/80 text-slate-500 hover:bg-slate-800 border-white/5'
                        }`}
                      >
                        {st.label.toUpperCase()}
                      </button>
                    ))}
                  </div>

                  <form onSubmit={save} className="space-y-6">
                    
                    {/* Табы */}
                    <div className="flex bg-slate-900/50 p-1 rounded-2xl border border-white/5">
                      {MODAL_TABS.map(tab => (
                        <button
                          key={tab.id}
                          type="button"
                          onClick={() => setModalTab(tab.id)}
                          className={`flex-1 py-3 text-[11px] font-black uppercase rounded-xl transition-all ${
                            modalTab === tab.id ? 'bg-slate-700 text-white shadow-md' : 'text-slate-400 hover:text-slate-300'
                          }`}
                        >
                          {tab.label}
                        </button>
                      ))}
                    </div>

                    {/* Контент табов */}
                    <div className="min-h-[220px]">
                      
                      {modalTab === 'scores' && (
                        <div className="space-y-4 fade-in">
                          <div className="bg-amber-500/10 border border-amber-500/20 p-4 rounded-2xl flex justify-between items-center mb-6">
                            <span className="text-[12px] font-black text-amber-500 uppercase tracking-widest">Общий балл</span>
                            <span className="text-2xl font-black text-amber-400">
                              {(Number(editingSchool.mathScore)||0) + (Number(editingSchool.infoScore)||0) + (Number(editingSchool.rusScore)||0)}
                            </span>
                          </div>
                          <div className="grid grid-cols-3 gap-3">
                            <div className="flex flex-col gap-2">
                              <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 text-center">Математика</label>
                              <input type="number" max="100" min="0" value={editingSchool.mathScore || ''} onChange={e => setEditingSchool({ ...editingSchool, mathScore: e.target.value })}
                                className="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-4 py-4 text-center text-xl font-black text-white focus:border-blue-500" placeholder="-" />
                            </div>
                            <div className="flex flex-col gap-2">
                              <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 text-center">Инфо / Физика</label>
                              <input type="number" max="100" min="0" value={editingSchool.infoScore || ''} onChange={e => setEditingSchool({ ...editingSchool, infoScore: e.target.value })}
                                className="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-4 py-4 text-center text-xl font-black text-white focus:border-blue-500" placeholder="-" />
                            </div>
                            <div className="flex flex-col gap-2">
                              <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 text-center">Русский</label>
                              <input type="number" max="100" min="0" value={editingSchool.rusScore || ''} onChange={e => setEditingSchool({ ...editingSchool, rusScore: e.target.value })}
                                className="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-4 py-4 text-center text-xl font-black text-white focus:border-blue-500" placeholder="-" />
                            </div>
                          </div>
                        </div>
                      )}

                      {modalTab === 'interview' && (
                        <div className="space-y-4 fade-in">
                          <div className="grid grid-cols-2 gap-4">
                            <div className="flex flex-col gap-2">
                              <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Дата встречи / Экзамена</label>
                              <input type="date" value={editingSchool.appointmentDate || ''} onChange={e => setEditingSchool({ ...editingSchool, appointmentDate: e.target.value })}
                                className="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-4 py-4 text-[13px] font-black text-white focus:border-blue-500" />
                            </div>
                            <div className="flex flex-col gap-2">
                              <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Время</label>
                              <input type="time" value={editingSchool.appointmentTime || ''} onChange={e => setEditingSchool({ ...editingSchool, appointmentTime: e.target.value })}
                                className="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-4 py-4 text-[13px] font-black text-white focus:border-blue-500" />
                            </div>
                          </div>
                          
                          {/* История */}
                          <div className="mt-6">
                            <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">История действий</h4>
                            <div className="bg-slate-900/50 rounded-xl p-4 border border-white/5 max-h-[120px] overflow-y-auto custom-scrollbar">
                              {!editingSchool.timeline || editingSchool.timeline.length === 0 ? (
                                <p className="text-[11px] text-slate-500 italic">Событий пока нет</p>
                              ) : (
                                <div className="space-y-3">
                                  {editingSchool.timeline.map((event, i) => (
                                    <div key={i} className="flex gap-3 text-[11px]">
                                      <div className="w-1.5 h-1.5 bg-blue-500 rounded-full mt-1.5 shrink-0"></div>
                                      <div>
                                        <p className="text-white font-bold">{event.text}</p>
                                        <p className="text-slate-500">{new Date(event.date).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</p>
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      )}

                      {modalTab === 'agreements' && (
                        <div className="space-y-4 fade-in h-full">
                          <div className="flex flex-col gap-2 h-full">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Итоговые договоренности</label>
                            <textarea 
                              value={editingSchool.agreements || ''} 
                              onChange={e => setEditingSchool({ ...editingSchool, agreements: e.target.value })}
                              placeholder="Прошли собеседование. Обещали перезвонить..."
                              className="w-full bg-slate-900/80 border border-slate-700/50 rounded-2xl px-6 py-5 text-[13px] font-bold text-white outline-none focus:border-blue-500 min-h-[180px] leading-relaxed resize-none"
                            />
                          </div>
                        </div>
                      )}

                    </div>

                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-[16px] shadow-[0_0_20px_rgba(59,130,246,0.5)] active:scale-95 transition-all text-[14px] tracking-widest uppercase border border-blue-400/50 mt-4">
                      Сохранить данные
                    </button>
                  </form>

                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
