<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ИТ . CRM . ERP — ШКОЛЫ МОСКВЫ</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              900: '#0c4a6e',
            }
          },
          animation: {
            'slide-up': 'slideUp 0.5s ease-out forwards',
            'fade-in': 'fadeIn 0.3s ease-out forwards',
          },
          keyframes: {
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@1,300;1,400;1,700&display=swap" rel="stylesheet">
  
  <!-- Data Files -->
  <script src="schools_part1.js"></script>
  <script src="schools_part2.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --accent: #0ea5e9;
    }
    
    * {
      box-sizing: border-box;
      font-family: 'Roboto Condensed', sans-serif !important;
      font-style: italic !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    .glass-header {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      z-index: 50;
    }

    .premium-card {
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .premium-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      border-color: rgba(14, 165, 233, 0.3);
    }

    .status-btn {
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .status-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; width: 100%; height: 3px;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .status-btn.active::after {
      opacity: 1;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    .loading-shimmer {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Input Styling Reset */
    input, textarea, select {
      text-transform: none !important;
      font-style: normal !important;
      font-weight: 400 !important;
    }
  </style>
</head>
<body class="selection:bg-brand-100 selection:text-brand-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- Lucide Loader ---
    const Icon = ({ name, className }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current) {
          lucide.createIcons({
            root: iconRef.current,
            nameAttr: 'data-lucide',
            icons: lucide.icons
          });
        }
      }, [name]);
      return <span ref={iconRef} className={className}><i data-lucide={name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase()}></i></span>;
    };

    // --- Constants ---
    const STATUSES = [
      { id: 'plan', label: 'ПЛАН', color: 'bg-slate-100 text-slate-600' },
      { id: 'meet', label: 'ВСТРЕЧА', color: 'bg-blue-100 text-blue-600' },
      { id: 'visit', label: 'ВИЗИТ', color: 'bg-purple-100 text-purple-600' },
      { id: 'target', label: 'ЦЕЛЬ', color: 'bg-green-100 text-green-600' },
      { id: 'archive', label: 'АРХИВ', color: 'bg-gray-200 text-gray-500' },
      { id: 'calendar', label: 'РАСПИСАНИЕ', color: 'bg-amber-100 text-amber-600' }
    ];

    const App = () => {
      const [schools, setSchools] = useState([]);
      const [activeStatus, setActiveStatus] = useState('plan');
      const [editingSchool, setEditingSchool] = useState(null);
      const [search, setSearch] = useState('');
      const [sortBy, setSortBy] = useState('rating');
      const [showTimeline, setShowTimeline] = useState(false);

      // Load Data
      useEffect(() => {
        const saved = localStorage.getItem('school_crm_data');
        if (saved) {
          setSchools(JSON.parse(saved));
        } else {
          setSchools(window.SCHOOLS_DATABASE || []);
        }
      }, []);

      // Persistence
      useEffect(() => {
        if (schools.length > 0) {
          localStorage.setItem('school_crm_data', JSON.stringify(schools));
        }
      }, [schools]);

      // Filtering & Sorting
      const filteredSchools = useMemo(() => {
        let result = schools.filter(s => {
          const matchStatus = showTimeline ? (s.appointmentDate) : (s.status === activeStatus);
          const matchSearch = s.name.toLowerCase().includes(search.toLowerCase()) || 
                             s.address.toLowerCase().includes(search.toLowerCase());
          return matchStatus && matchSearch;
        });

        result.sort((a, b) => {
          if (sortBy === 'rating') return a.rating - b.rating;
          if (sortBy === 'distance') return a.distance - b.distance;
          if (sortBy === 'medals') return b.medalsCount - a.medalsCount;
          if (sortBy === 'cost') return b.costPlan - a.costPlan;
          return a.order - b.order;
        });

        return result;
      }, [schools, activeStatus, search, sortBy, showTimeline]);

      const counts = useMemo(() => {
        return STATUSES.reduce((acc, st) => {
          acc[st.id] = schools.filter(s => s.status === st.id).length;
          return acc;
        }, {});
      }, [schools]);

      const updateSchool = (id, updates) => {
        setSchools(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
      };

      return (
        <div className="min-h-screen pb-20">
          {/* Header */}
          <header className="glass-header sticky top-0 px-4 md:px-8 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center text-white shadow-lg">
                <Icon name="GraduationCap" />
              </div>
              <div>
                <h1 className="text-xl font-black tracking-tighter text-slate-900 leading-none">ИТ . CRM . ERP</h1>
                <p className="text-[10px] text-slate-400 mt-1 tracking-widest">{schools.length} ШКОЛ В БАЗЕ</p>
              </div>
            </div>

            <div className="flex items-center bg-slate-100 rounded-full px-4 py-2 w-full md:w-96">
              <Icon name="Search" className="text-slate-400 mr-2" />
              <input 
                type="text" 
                placeholder="ПОИСК ШКОЛЫ ИЛИ АДРЕСА..." 
                className="bg-transparent border-none outline-none w-full text-xs font-bold"
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
            </div>

            <div className="flex items-center gap-2">
              <button className="p-2 hover:bg-slate-100 rounded-full text-slate-400 hover:text-brand-500 transition-colors">
                <Icon name="Settings" />
              </button>
              <button className="p-2 hover:bg-slate-100 rounded-full text-slate-400 hover:text-brand-500 transition-colors">
                <Icon name="Bell" />
              </button>
              <div className="w-8 h-8 rounded-full bg-slate-200 border-2 border-white overflow-hidden shadow-sm">
                <img src="https://ui-avatars.com/api/?name=Admin&background=0ea5e9&color=fff" alt="User" />
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 md:px-8 mt-8">
            {/* Nav Tabs */}
            <div className="flex flex-wrap gap-2 mb-8 border-b border-slate-200 pb-4 no-scrollbar overflow-x-auto">
              {STATUSES.map(st => (
                <button
                  key={st.id}
                  onClick={() => { setActiveStatus(st.id); setShowTimeline(st.id === 'calendar'); }}
                  className={`status-btn px-6 py-3 rounded-xl flex items-center gap-2 text-xs font-bold transition-all ${
                    (activeStatus === st.id && !showTimeline) || (showTimeline && st.id === 'calendar') 
                      ? 'bg-white shadow-sm border border-slate-100 text-brand-600 scale-105' 
                      : 'text-slate-400 hover:text-slate-600'
                  }`}
                >
                  {st.label} . <span className="opacity-50">{counts[st.id] || 0}</span>
                </button>
              ))}
            </div>

            {/* List Header */}
            <div className="flex items-center justify-between mb-6">
              <div className="flex items-center gap-2 text-xs text-slate-400">
                <Icon name="Filter" className="w-3 h-3" />
                <span>СОРТИРОВКА:</span>
                <select 
                  className="bg-transparent font-bold text-slate-900 outline-none cursor-pointer"
                  value={sortBy}
                  onChange={e => setSortBy(e.target.value)}
                >
                  <option value="rating">ПО РЕЙТИНГУ</option>
                  <option value="distance">ПО ДИСТАНЦИИ</option>
                  <option value="medals">ПО МЕДАЛЯМ</option>
                  <option value="cost">ПО ЦЕНЕ</option>
                </select>
              </div>
              <div className="text-[10px] font-bold text-slate-300">
                ОТОБРАЖЕНО: {filteredSchools.length} ИЗ {schools.length}
              </div>
            </div>

            {/* Grid */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {filteredSchools.map((school, idx) => (
                <div 
                  key={school.id}
                  className="premium-card rounded-2xl p-6 flex flex-col animate-slide-up"
                  style={{ animationDelay: `${idx * 0.05}s` }}
                  onClick={() => setEditingSchool(school)}
                >
                  <div className="flex justify-between items-start mb-4">
                    <span className="text-[10px] text-brand-500 font-bold px-2 py-1 bg-brand-50 rounded-lg">
                      #{school.rating} В РЕЙТИНГЕ
                    </span>
                    <div className="flex gap-1">
                      {school.isPaid && <Icon name="CreditCard" className="text-rose-400 w-4 h-4" />}
                      <Icon name="MapPin" className="text-slate-300 w-4 h-4" />
                    </div>
                  </div>

                  <h3 className="text-lg font-black text-slate-900 mb-2 leading-tight">
                    {school.name}
                  </h3>
                  
                  <p className="text-[11px] text-slate-500 mb-4 line-clamp-1 italic">
                    {school.address}
                  </p>

                  <div className="flex flex-wrap gap-2 mb-6">
                    <div className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 rounded-lg border border-slate-100">
                      <Icon name="Navigation" className="w-3 h-3 text-brand-500" />
                      <span className="text-[10px]">{school.distance} КМ</span>
                    </div>
                    <div className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 rounded-lg border border-slate-100">
                      <Icon name="Trophy" className="w-3 h-3 text-amber-500" />
                      <span className="text-[10px]">{school.medalsCount} МЕД.</span>
                    </div>
                    {school.isPaid && (
                      <div className="flex items-center gap-1.5 px-3 py-1.5 bg-rose-50 rounded-lg border border-rose-100">
                        <Icon name="Wallet" className="w-3 h-3 text-rose-500" />
                        <span className="text-[10px]">{school.costPlan.toLocaleString()} ₽</span>
                      </div>
                    )}
                  </div>

                  <div className="mt-auto pt-4 border-t border-slate-50 flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <div className="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-400">
                        <Icon name="Info" className="w-4 h-4" />
                      </div>
                      <span className="text-[9px] text-slate-400 font-bold">{school.profile || 'ПРОФИЛЬ НЕ УКАЗАН'}</span>
                    </div>
                    <button 
                      className="p-2 text-slate-300 hover:text-brand-500 transition-colors"
                      onClick={(e) => { e.stopPropagation(); window.open(school.site, '_blank'); }}
                    >
                      <Icon name="ExternalLink" className="w-4 h-4" />
                    </button>
                  </div>
                </div>
              ))}
            </div>

            {filteredSchools.length === 0 && (
              <div className="py-20 flex flex-col items-center justify-center text-slate-300">
                <Icon name="SearchX" className="w-16 h-16 mb-4 opacity-20" />
                <p className="text-sm font-bold tracking-widest">НИЧЕГО НЕ НАЙДЕНО</p>
              </div>
            )}
          </main>

          {/* Modal */}
          {editingSchool && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animate-fade-in">
              <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setEditingSchool(null)}></div>
              <div className="relative bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col animate-slide-up">
                {/* Modal Header */}
                <div className="px-8 py-6 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 bg-white rounded-2xl shadow-sm border border-slate-100 flex items-center justify-center text-brand-500">
                      <Icon name="Edit3" />
                    </div>
                    <div>
                      <h4 className="text-sm text-slate-400 tracking-wider">РЕДАКТИРОВАНИЕ КАРТОЧКИ</h4>
                      <h2 className="text-xl font-black text-slate-900 leading-tight uppercase">{editingSchool.name}</h2>
                    </div>
                  </div>
                  <button onClick={() => setEditingSchool(null)} className="p-2 hover:bg-white rounded-xl text-slate-300 hover:text-slate-600 transition-all">
                    <Icon name="X" />
                  </button>
                </div>

                {/* Tabs */}
                <ModalContent school={editingSchool} updateSchool={updateSchool} />

                {/* Action Footer */}
                <div className="px-8 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                  <button 
                    onClick={() => setEditingSchool(null)}
                    className="px-6 py-2 rounded-xl text-xs font-bold text-slate-500 hover:bg-white transition-all border border-transparent hover:border-slate-200"
                  >
                    ОТМЕНА
                  </button>
                  <button 
                    onClick={() => setEditingSchool(null)}
                    className="px-8 py-2 rounded-xl bg-brand-500 text-white text-xs font-bold shadow-lg shadow-brand-200 hover:bg-brand-600 active:scale-95 transition-all"
                  >
                    СОХРАНИТЬ ИЗМЕНЕНИЯ
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const ModalContent = ({ school, updateSchool }) => {
      const [tab, setTab] = useState('main');

      return (
        <div className="p-8 max-h-[70vh] overflow-y-auto no-scrollbar">
          <div className="flex gap-4 mb-8 border-b border-slate-100 pb-2 overflow-x-auto no-scrollbar">
            {['main', 'scores', 'finance', 'notes'].map(t => (
              <button 
                key={t}
                onClick={() => setTab(t)}
                className={`text-[10px] font-black pb-2 px-2 transition-all border-b-2 ${tab === t ? 'border-brand-500 text-brand-500' : 'border-transparent text-slate-300'}`}
              >
                {t === 'main' ? 'ИНФО' : t === 'scores' ? 'БАЛЛЫ' : t === 'finance' ? 'ФИНАНСЫ' : 'ЗАМЕТКИ'}
              </button>
            ))}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {tab === 'main' && (
              <>
                <div className="space-y-2">
                  <label className="text-[10px] text-slate-400 font-bold ml-1">СТАТУС КАРТОЧКИ</label>
                  <select 
                    className="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-xs font-bold outline-none focus:border-brand-300"
                    value={school.status}
                    onChange={e => updateSchool(school.id, { status: e.target.value })}
                  >
                    {STATUSES.map(st => <option key={st.id} value={st.id}>{st.label}</option>)}
                  </select>
                </div>
                <div className="space-y-2">
                  <label className="text-[10px] text-slate-400 font-bold ml-1">ДАТА ИНТЕРВЬЮ</label>
                  <input 
                    type="date" 
                    className="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-xs font-bold outline-none"
                    value={school.appointmentDate || ''}
                    onChange={e => updateSchool(school.id, { appointmentDate: e.target.value })}
                  />
                </div>
                <div className="col-span-full space-y-2">
                  <label className="text-[10px] text-slate-400 font-bold ml-1">КОНТАКТЫ</label>
                  <div className="grid grid-cols-2 gap-4">
                    <input type="text" placeholder="ТЕЛЕФОН" className="bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-xs" value={school.phone} readOnly />
                    <input type="text" placeholder="АДРЕС" className="bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-xs" value={school.address} readOnly />
                  </div>
                </div>
              </>
            )}

            {tab === 'finance' && (
              <>
                <div className="space-y-2">
                  <label className="text-[10px] text-slate-400 font-bold ml-1">СТОИМОСТЬ (ПЛАН)</label>
                  <input 
                    type="number" 
                    className="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-xs font-bold"
                    value={school.costPlan}
                    onChange={e => updateSchool(school.id, { costPlan: Number(e.target.value) })}
                  />
                </div>
                <div className="space-y-2">
                  <label className="text-[10px] text-slate-400 font-bold ml-1">СТОИМОСТЬ (ФАКТ)</label>
                  <input 
                    type="number" 
                    className="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-xs font-bold"
                    value={school.costFact}
                    onChange={e => updateSchool(school.id, { costFact: Number(e.target.value) })}
                  />
                </div>
              </>
            )}

            {tab === 'notes' && (
              <div className="col-span-full space-y-2">
                <label className="text-[10px] text-slate-400 font-bold ml-1">ДОГОВОРЕННОСТИ И ПЛАНЫ</label>
                <textarea 
                  className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-xs font-medium h-40 outline-none focus:border-brand-300"
                  placeholder="ОПИШИТЕ О ЧЕМ ДОГОВОРИЛИСЬ..."
                  value={school.agreements || ''}
                  onChange={e => updateSchool(school.id, { agreements: e.target.value })}
                ></textarea>
              </div>
            )}

            {tab === 'scores' && (
              <>
                <div className="space-y-2">
                  <label className="text-[10px] text-slate-400 font-bold ml-1">МАТЕМАТИКА</label>
                  <input type="number" className="w-full bg-slate-50 rounded-xl px-4 py-3 text-xs" value={school.mathScore || ''} onChange={e => updateSchool(school.id, { mathScore: e.target.value })} />
                </div>
                <div className="space-y-2">
                  <label className="text-[10px] text-slate-400 font-bold ml-1">ИНФОРМАТИКА</label>
                  <input type="number" className="w-full bg-slate-50 rounded-xl px-4 py-3 text-xs" value={school.infoScore || ''} onChange={e => updateSchool(school.id, { infoScore: e.target.value })} />
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
